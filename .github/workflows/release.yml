name: Build and Release Skills

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq

      # Use koalaman's rolling "stable" channel rather than the apt shellcheck
      # package, which lags the current release and drifts with the runner image
      # (it shipped 0.9.0, the version skew behind the SC2317 incident). Running
      # the newest stable analyzer keeps CI aligned with current developer tooling
      # and lets new checks surface emergent issues early. Intentionally unpinned.
      - name: Install latest stable ShellCheck
        run: |
          curl -fsSL -o shellcheck.tar.xz https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz
          tar -xJf shellcheck.tar.xz
          sudo install shellcheck-stable/shellcheck /usr/local/bin/shellcheck
          rm -rf shellcheck-stable shellcheck.tar.xz
          shellcheck --version

      - name: Install and verify plugins
        run: ./scripts/install-and-verify.sh

      - name: Generate version
        id: version
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          VERSION="${TIMESTAMP}.${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Build skill ZIPs
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build-skills.sh

      - name: List artifacts
        run: ls -la dist/

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing 'latest' release if it exists
          gh release delete latest --yes 2>/dev/null || true

          # Delete the tag too so we can recreate it
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new release with all ZIPs
          gh release create latest \
            dist/*.zip \
            --title "Latest Build (${{ steps.version.outputs.version }})" \
            --notes "Continuous build from commit ${{ github.sha }}

          **Version:** \`${{ steps.version.outputs.version }}\`

          Download individual skill ZIPs and upload to Claude Desktop via **Settings > Capabilities**.

          See [README](https://github.com/${{ github.repository }}#claude-desktop--claude-web) for installation instructions."
